<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Cache Devre Disi: Chrome, Safari, Firefox hicbir sayfayi hatirlamamali -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}?v={{ range(1, 99999) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-nav.css') }}?v={{ range(1, 99999) | random }}">

    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script>
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
            if (init && init.method && init.method.toUpperCase() === 'POST') {
                const meta = document.querySelector('meta[name="csrf-token"]');
                if (meta) {
                    const csrfToken = meta.getAttribute('content');
                    init.headers = init.headers || {};
                    if (init.headers instanceof Headers) {
                        init.headers.set('X-CSRFToken', csrfToken);
                    } else if (Array.isArray(init.headers)) {
                        const idx = init.headers.findIndex(([k]) => k.toLowerCase() === 'x-csrftoken');
                        if (idx !== -1) init.headers[idx][1] = csrfToken;
                        else init.headers.push(['X-CSRFToken', csrfToken]);
                    } else {
                        init.headers['X-CSRFToken'] = csrfToken;
                    }
                }
            }
            if (init === undefined) {
                return originalFetch(input);
            }
            return originalFetch(input, init);
        };
    </script>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center g-0">
            <div class="col-12 col-md-10 col-lg-6">
                <div class="login-card">
                    <h2>
                        <i class="fas fa-shield-alt me-2"></i>Admin Girişi
                    </h2>
                    
                    {% if error %}
                    <div class="alert alert-danger mb-4">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        Hatalı şifre! Lütfen tekrar deneyin.
                    </div>
                    {% endif %}
                    
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-2"></i>Şifre
                            </label>
                            <input type="password" id="password" name="password" class="form-control" 
                                   placeholder="Admin şifresini girin" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i>Giriş Yap
                        </button>
                    </form>
                    <a href="/" class="btn-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Ana Sayfaya Dön
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <a href="/" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Anasayfa</span>
        </a>
        <a href="/token_al" class="nav-item">
            <i class="fas fa-key"></i>
            <span>Token Al</span>
        </a>
        <a href="/admin" class="nav-item active">
            <i class="fas fa-user-shield"></i>
            <span>Admin Panel</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Page Transition Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('csrf_expired')) {
                setTimeout(function() {
                    alert("Güvenlik anahtarınız yenilendi, lütfen işlemi tekrar deneyin.");
                }, 600);
            }

            document.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    if (this.target === '_blank' || !this.href || this.href.startsWith('javascript:') || this.getAttribute('href').startsWith('#') || this.hasAttribute('download')) return;
                    if (this.hostname === window.location.hostname) {
                        e.preventDefault();
                        const targetUrl = this.href;
                        document.body.classList.add('page-transitioning-out');
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 350);
                    }
                });
            });
        });
    </script>
</body>
</html>
